<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World | JNC TECHLABS</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        
        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #0f172a 0%, #1e2937 100%);
            color: white;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        
        .dashboard {
            text-align: center;
            padding: 4rem 2rem;
            background: rgba(15, 23, 42, 0.8);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgb(0 0 0 / 0.4);
            border: 1px solid rgba(148, 163, 184, 0.2);
            max-width: 500px;
        }
        
        .logo {
            font-size: 4.5rem;
            margin-bottom: 1rem;
            display: inline-block;
        }
        
        h1 {
            font-size: 2.8rem;
            font-weight: 700;
            margin: 0 0 0.5rem 0;
            background: linear-gradient(to right, #60a5fa, #a78bfa);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .tagline {
            color: #94a3b8;
            font-size: 1.1rem;
            margin-bottom: 3rem;
        }
        
        .status {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            background: rgba(16, 185, 129, 0.1);
            color: #4ade80;
            padding: 8px 20px;
            border-radius: 9999px;
            font-size: 0.95rem;
            margin-bottom: 2rem;
        }
        
        .footer {
            margin-top: 3rem;
            color: #64748b;
            font-size: 0.9rem;
        }
    </style>
</head>
<body>
    <div class="dashboard">
        <div class="logo">🦁</div>
        <h1>Hello World</h1>
        <p class="tagline">JNC TECHLABS Dashboard</p>
        
        <div class="status">
            <span>●</span>
            <span>System Online • March 2026</span>
        </div>
        
        <p style="color:#cbd5e1; line-height:1.7;">
            This is a demonstration dashboard created by JNC TECHLABS.<br>
            Built with love using GitHub + Vercel.
        </p>
        
        <div class="footer">
            JNC TECHLABS © 2026 • Execution Agent
        </div>
    </div>
</body>
</html>
